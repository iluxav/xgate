listen: ":80"

# Set to true to automatically add/remove entries in /etc/hosts on start/stop.
# Requires root. Wildcard routes are skipped (macOS resolves *.localhost natively).
manage_hosts: true

routes:
  - host: "gateway.localhost"
    target: "http://localhost:8081"

  - host: "*.api.localhost"
    target: "http://localhost:8081"

  - host: "app.localhost"
    target: "http://localhost:5173"

  - host: "*.app.localhost"
    target: "http://localhost:5173"

  
