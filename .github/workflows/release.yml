name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" -o xgate .
          tar czf "xgate_${GOOS}_${GOARCH}.tar.gz" xgate
          rm xgate
      - uses: actions/upload-artifact@v4
        with:
          name: xgate_${{ matrix.goos }}_${{ matrix.goarch }}
          path: xgate_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum xgate_*.tar.gz > sha256sums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/xgate_*.tar.gz
            dist/sha256sums.txt
          generate_release_notes: true
